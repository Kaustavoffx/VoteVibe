<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VoteVibe - Your Civic Guide</title>
    <meta name="description" content="VoteVibe: An interactive election education platform.">
    
    <!-- Strict Content Security Policy -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://www.googletagmanager.com https://www.gstatic.com; connect-src 'self' http://localhost:8000 https://votevibe-placeholder.run.app https://region1.google-analytics.com https://www.google-analytics.com https://www.google.com https://www.gstatic.com; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' data: https://fonts.gstatic.com https://fonts.googleapis.com; img-src 'self' data: https://www.googletagmanager.com https://www.google-analytics.com https://www.google.com;">
    <link rel="icon" href="data:,">


    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <!-- Google Analytics (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-PLACEHOLDER"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag(){dataLayer.push(arguments);}
        gtag('js', new Date());
        gtag('config', 'G-PLACEHOLDER');
    </script>

    <!-- Firebase SDK (v10.8.1) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-app.js";
        import { getAuth } from "https://www.gstatic.com/firebasejs/10.8.1/firebase-auth.js";
        
        const firebaseConfig = {
            apiKey: "MOCK_API_KEY",
            authDomain: "votevibe.firebaseapp.com",
            projectId: "votevibe",
            storageBucket: "votevibe.appspot.com",
            messagingSenderId: "1234567890",
            appId: "1:1234567890:web:mock123"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
    </script>

    <style>
        :root {
            --bg-color: #0d1117;
            --surface-color: rgba(22, 27, 34, 0.6);
            --surface-border: rgba(255, 255, 255, 0.1);
            --text-primary: #f0f6fc;
            --text-secondary: #8b949e;
            --accent-glow: rgba(88, 166, 255, 0.4);
            --accent-color: #58a6ff;
            --accent-hover: #388bfd;
            --danger-color: #f85149;
            --font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Animated Mesh Gradient Background */
        .mesh-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -1;
            background: 
                radial-gradient(circle at 15% 50%, rgba(40, 20, 80, 0.5), transparent 50%),
                radial-gradient(circle at 85% 30%, rgba(20, 60, 100, 0.4), transparent 50%);
            filter: blur(80px);
            animation: mesh-flow 15s ease-in-out infinite alternate;
        }

        @keyframes mesh-flow {
            0% { transform: scale(1) translate(0, 0); }
            100% { transform: scale(1.1) translate(-20px, 20px); }
        }

        /* Navigation */
        nav {
            width: 100%;
            padding: 1.5rem 2rem;
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--surface-border);
            background: rgba(13, 17, 23, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            position: sticky;
            top: 0;
            z-index: 10;
        }

        nav h1 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.05em;
            background: linear-gradient(to right, #fff, #8b949e);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Main Content */
        main {
            width: 100%;
            max-width: 800px;
            padding: 4rem 2rem;
            display: flex;
            flex-direction: column;
            gap: 3rem;
        }

        /* Hero / Widget Section */
        .widget-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .widget-section h2 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            letter-spacing: -0.03em;
        }

        .widget-section p {
            color: var(--text-secondary);
            margin-bottom: 2.5rem;
            font-size: 1.1rem;
        }

        /* Glassmorphism Card */
        .glass-card {
            background: var(--surface-color);
            border: 1px solid var(--surface-border);
            border-radius: 16px;
            padding: 2.5rem;
            width: 100%;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
        }

        .input-wrapper {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        label {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-secondary);
        }

        input {
            width: 100%;
            padding: 1rem 1.2rem;
            border-radius: 8px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid var(--surface-border);
            color: var(--text-primary);
            font-size: 1rem;
            font-family: var(--font-family);
            transition: all 0.3s ease;
            outline: none;
        }

        input:focus {
            border-color: var(--accent-color);
            box-shadow: 0 0 0 2px var(--accent-glow);
        }

        input::placeholder {
            color: rgba(139, 148, 158, 0.5);
        }

        button {
            padding: 1rem 2rem;
            border-radius: 8px;
            background: var(--accent-color);
            color: #fff;
            font-weight: 600;
            font-size: 1rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            font-family: var(--font-family);
        }

        button:hover {
            background: var(--accent-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
        }

        .loader {
            display: none;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        #error-message {
            color: var(--danger-color);
            font-size: 0.9rem;
            margin-top: 1rem;
            text-align: center;
            min-height: 1.2rem;
        }

        /* Timeline Section */
        .timeline-section {
            display: flex;
            flex-direction: column;
            gap: 2rem;
        }

        .timeline-container {
            display: none;
            flex-direction: column;
            position: relative;
            padding-left: 2rem;
            border-left: 2px solid var(--surface-border);
        }

        .timeline-container.active {
            display: flex;
            animation: fadeIn 0.5s ease forwards;
        }

        .timeline-item {
            position: relative;
            padding-bottom: 3rem;
            opacity: 0;
            transform: translateY(20px);
            animation: slideUp 0.5s ease forwards;
        }

        .timeline-item:last-child {
            padding-bottom: 0;
        }

        /* Glowing Node */
        .timeline-item::before {
            content: '';
            position: absolute;
            left: -2.35rem; /* Account for padding + border width */
            top: 0;
            width: 1rem;
            height: 1rem;
            border-radius: 50%;
            background: var(--bg-color);
            border: 2px solid var(--accent-color);
            box-shadow: 0 0 10px var(--accent-glow);
            z-index: 1;
        }

        .timeline-item:nth-child(1) { animation-delay: 0.1s; }
        .timeline-item:nth-child(2) { animation-delay: 0.3s; }
        .timeline-item:nth-child(3) { animation-delay: 0.5s; }

        .timeline-step {
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--accent-color);
            font-weight: 700;
            margin-bottom: 0.5rem;
        }

        .timeline-action {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 0.5rem;
        }

        .timeline-details {
            font-size: 1rem;
            color: var(--text-secondary);
            line-height: 1.6;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .glass-card { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="mesh-bg" aria-hidden="true"></div>

    <nav aria-label="Main Navigation">
        <h1>VoteVibe</h1>
    </nav>

    <main>
        <section class="widget-section" aria-labelledby="hero-heading">
            <h2 id="hero-heading">Your Voter Journey Starts Here</h2>
            <p>Get a personalized, 3-step action plan for your upcoming election.</p>

            <div class="glass-card">
                <form id="timeline-form" class="form-group" aria-label="Election query form">
                    <div class="input-wrapper">
                        <label for="zipcode">ZIP Code</label>
                        <input 
                            type="text" 
                            id="zipcode" 
                            name="zipcode" 
                            placeholder="e.g. 90210" 
                            required 
                            minlength="5" 
                            maxlength="6"
                            pattern="[0-9]{5,6}"
                            title="Enter a 5 or 6 digit postal code"
                            aria-required="true"
                            aria-label="Enter your ZIP code"
                        >
                    </div>
                    <div class="input-wrapper">
                        <label for="query">What do you need to know?</label>
                        <input 
                            type="text" 
                            id="query" 
                            name="query" 
                            placeholder="e.g. How do I register to vote?" 
                            required 
                            minlength="10" 
                            maxlength="200"
                            aria-required="true"
                            aria-label="Enter your election question"
                        >
                    </div>
                    <button type="submit" id="submit-btn" aria-label="Generate action plan">
                        <span>Generate Timeline</span>
                        <div class="loader" id="btn-loader" aria-hidden="true"></div>
                    </button>
                    <div id="error-message" role="alert" aria-live="assertive"></div>
                </form>
            </div>
        </section>

        <section class="timeline-section" aria-label="Election Timeline Results">
            <!-- Timeline renders here. Required aria-live and aria-atomic attributes -->
            <div id="timeline-results" class="timeline-container" aria-live="polite" aria-atomic="true">
                <!-- Dynamically populated by JS -->
            </div>
        </section>
    </main>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const form = document.getElementById('timeline-form');
            const submitBtn = document.getElementById('submit-btn');
            const btnText = submitBtn.querySelector('span');
            const loader = document.getElementById('btn-loader');
            const errorMessage = document.getElementById('error-message');
            const timelineResults = document.getElementById('timeline-results');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                // Clear previous state
                errorMessage.textContent = '';
                timelineResults.classList.remove('active');
                timelineResults.innerHTML = '';
                
                const zipCode = document.getElementById('zipcode').value.trim();
                const query = document.getElementById('query').value.trim();

                // UI Loading State
                submitBtn.disabled = true;
                btnText.textContent = 'Analyzing...';
                loader.style.display = 'block';

                try {
                    // Always point to local backend for testing unless in production environment
                    const apiUrl = 'http://localhost:8000/api/election-timeline';

                    const response = await fetch(apiUrl, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify({ zip_code: zipCode, query: query })
                    });

                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(errorData.detail || 'Failed to fetch timeline.');
                    }

                    const data = await response.json();
                    renderTimeline(data.steps);

                } catch (error) {
                    console.error('Error fetching timeline:', error);
                    errorMessage.textContent = error.message || 'An error occurred while generating your timeline. Please try again.';
                } finally {
                    // Reset UI
                    submitBtn.disabled = false;
                    btnText.textContent = 'Generate Timeline';
                    loader.style.display = 'none';
                }
            });

            function renderTimeline(steps) {
                if (!steps || !Array.isArray(steps)) {
                    errorMessage.textContent = 'Received invalid timeline data.';
                    return;
                }

                timelineResults.innerHTML = steps.map(stepObj => `
                    <div class="timeline-item">
                        <div class="timeline-step">Step ${stepObj.step}</div>
                        <div class="timeline-action">${stepObj.action}</div>
                        <div class="timeline-details">${stepObj.details}</div>
                    </div>
                `).join('');

                // Trigger animation
                timelineResults.classList.add('active');
            }
        });
    </script>
</body>
</html>
